services:
  server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - AEZAB_DATABASE_URL=${AEZAB_DATABASE_URL:-${HLAB_DATABASE_URL:-sqlite+aiosqlite:///./data/aezab.db}}
      - AEZAB_REDIS_URL=${AEZAB_REDIS_URL:-${HLAB_REDIS_URL:-redis://redis:6379/0}}
      - AEZAB_HF_ENDPOINT=${AEZAB_HF_ENDPOINT:-${HLAB_HF_ENDPOINT:-https://hf-mirror.com}}
      - HF_ENDPOINT=${AEZAB_HF_ENDPOINT:-${HLAB_HF_ENDPOINT:-https://hf-mirror.com}}
    volumes:
      - aezab-data:/app/data
      - aezab-model-cache:/root/.cache/huggingface
    depends_on:
      - redis
    restart: unless-stopped
    # Cap the container's json-file log on disk: unbounded logs are a
    # common cause of an unattended self-hosted install filling its disk
    # and taking the whole site down.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    # Cap the container's json-file log on disk (see `server` service comment).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Local LLM via Ollama (CPU) — OPT-IN. The recommended path for most
  # deployments is to leave this disabled and connect a cloud model through
  # the console's first-run setup wizard instead (no download, no local
  # compute). If you want a fully offline local model, start this profile
  # explicitly:
  #   docker compose --profile local-llm up -d
  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    # Cap the container's json-file log on disk (see `server` service comment).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot: pulls a small local model so the console has something to talk
  # to out of the box, with zero manual setup. Runs once and exits (restart:
  # "no"). Only starts when the `local-llm` profile is active (see `ollama`
  # comment above) — plain `docker compose up -d` never triggers this
  # download. If you plan to use a cloud LLM instead (recommended), you can
  # delete both the `ollama` and `ollama-init` services entirely.
  ollama-init:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        until ollama list >/dev/null 2>&1; do
          echo 'Waiting for ollama to be ready...';
          sleep 2;
        done;
        ollama pull qwen2.5:1.5b
      "
    restart: "no"

  # Optional: vLLM for GPU inference
  # Uncomment below and comment out ollama if you have NVIDIA GPU.
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     - MODEL_NAME=Qwen/Qwen2.5-7B-Instruct
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   volumes:
  #     - vllm-cache:/root/.cache/huggingface
  #   restart: unless-stopped

  # Optional: PostgreSQL for production
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: aezab
  #     POSTGRES_USER: aezab
  #     POSTGRES_PASSWORD: aezab_pass
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  aezab-data:
  aezab-model-cache:
  ollama-models:
  # pgdata:
  # vllm-cache:
