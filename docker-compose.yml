services:
  server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - AEZAB_DATABASE_URL=${AEZAB_DATABASE_URL:-${HLAB_DATABASE_URL:-sqlite+aiosqlite:///./data/aezab.db}}
      - AEZAB_REDIS_URL=${AEZAB_REDIS_URL:-${HLAB_REDIS_URL:-redis://redis:6379/0}}
      - AEZAB_LLM_BASE_URL=${AEZAB_LLM_BASE_URL:-${HLAB_LLM_BASE_URL:-http://ollama:11434/v1}}
      - AEZAB_HF_ENDPOINT=${AEZAB_HF_ENDPOINT:-${HLAB_HF_ENDPOINT:-https://hf-mirror.com}}
      - HF_ENDPOINT=${AEZAB_HF_ENDPOINT:-${HLAB_HF_ENDPOINT:-https://hf-mirror.com}}
    volumes:
      - aezab-data:/app/data
      - aezab-model-cache:/root/.cache/huggingface
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Local LLM via Ollama (CPU)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  # Optional: vLLM for GPU inference
  # Uncomment below and comment out ollama if you have NVIDIA GPU.
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     - MODEL_NAME=Qwen/Qwen2.5-7B-Instruct
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   volumes:
  #     - vllm-cache:/root/.cache/huggingface
  #   restart: unless-stopped

  # Optional: PostgreSQL for production
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: aezab
  #     POSTGRES_USER: aezab
  #     POSTGRES_PASSWORD: aezab_pass
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  aezab-data:
  aezab-model-cache:
  ollama-models:
