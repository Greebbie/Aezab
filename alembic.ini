; Alembic configuration for Aezab (formerly HlAB).
;
; The actual database URL is NOT read from this file -- server/config.py
; (server.config.settings.database_url, AEZAB_DATABASE_URL / legacy
; HLAB_DATABASE_URL) is the single source of truth, and alembic/env.py reads
; it directly. sqlalchemy.url below is left blank on purpose so a stray
; `alembic upgrade head` invocation without env.py's override never silently
; targets the wrong database.
;
; See docs/migrations.md for the full migration workflow.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
