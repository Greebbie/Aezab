# Publish the HlAB SDKs (sdk/python -> PyPI, sdk/js -> npm) on a tagged
# release. Triggered by pushing a tag matching "sdk-v*" (e.g. sdk-v0.1.0).
#
# MAINTAINERS: before pushing the first sdk-v* tag, both of these repo
# secrets must be configured under Settings -> Secrets and variables ->
# Actions:
#   - PYPI_API_TOKEN   a PyPI API token scoped to the "hlab-client" project
#                       (https://pypi.org/manage/account/token/)
#   - NPM_TOKEN         an npm automation token with publish rights for the
#                       "hlab-client" package (https://www.npmjs.com/settings/<you>/tokens)
#
# This workflow only builds and publishes what is already committed — it
# does not bump version numbers. Bump sdk/python/pyproject.toml's
# [project].version and sdk/js/package.json's "version" in a normal commit
# first, then tag that commit as sdk-vX.Y.Z.

name: Publish SDKs

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read

jobs:
  publish-python:
    name: Build and publish Python SDK to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    name: Build and publish JS/TS SDK to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build (tsc -> dist/)
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
